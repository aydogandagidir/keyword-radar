<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Bluedev Marketplace Keyword Radar">
  <!--
    Designed in Figma (file Q9NmbOvM3uwwnL7Iqoe0ON), reproduced here as the
    in-repo vector source so `pnpm icons` can render crisp PNGs at every size.
  -->
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="128" height="128" rx="28" fill="#15327A"/>

  <!-- radar sweep wedge (top-right quadrant) -->
  <path d="M64 64 L64 20 A44 44 0 0 1 108 64 Z" fill="#6EE7FF" fill-opacity="0.26"/>

  <!-- crosshair -->
  <g fill="#CFF3FF" fill-opacity="0.38">
    <rect x="20" y="62.5" width="88" height="3" rx="1.5"/>
    <rect x="62.5" y="20" width="3" height="88" rx="1.5"/>
  </g>

  <!-- radar rings -->
  <g fill="none">
    <circle cx="64" cy="64" r="42" stroke="#7FE9FF" stroke-width="6"/>
    <circle cx="64" cy="64" r="26" stroke="#7FE9FF" stroke-opacity="0.6" stroke-width="5"/>
  </g>

  <!-- center hub -->
  <circle cx="64" cy="64" r="6" fill="#FFFFFF"/>

  <!-- detected keyword blip -->
  <circle cx="88" cy="44" r="7" fill="#6BFFB0" filter="url(#glow)"/>
</svg>
